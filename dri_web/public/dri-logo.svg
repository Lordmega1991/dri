<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055AA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle with subtle gradient -->
  <circle cx="100" cy="100" r="95" fill="url(#blueGradient)" opacity="0.08"/>
  
  <!-- Globe/Network Pattern - more subtle -->
  <g opacity="0.12" stroke="#003366" stroke-width="1.5" fill="none">
    <circle cx="100" cy="100" r="65"/>
    <ellipse cx="100" cy="100" rx="65" ry="35"/>
    <ellipse cx="100" cy="100" rx="35" ry="65"/>
    <line x1="35" y1="100" x2="165" y2="100"/>
    <line x1="100" y1="35" x2="100" y2="165"/>
  </g>
  
  <!-- Decorative Arc - top -->
  <path d="M 45 95 Q 100 45, 155 95" stroke="url(#goldGradient)" stroke-width="3" fill="none" opacity="0.5"/>
  
  <!-- Main DRI Text - larger and bolder -->
  <text x="100" y="88" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" 
        fill="#003366" text-anchor="middle" letter-spacing="3">DRI</text>
  
  <!-- UFPB Text - MUCH larger and more visible -->
  <text x="100" y="125" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" 
        fill="#FFD700" text-anchor="middle" letter-spacing="6">UFPB</text>
  
  <!-- Decorative elements -->
  <circle cx="35" cy="80" r="2.5" fill="#FFD700"/>
  <circle cx="165" cy="80" r="2.5" fill="#FFD700"/>
  
  <!-- Bottom accent line -->
  <line x1="55" y1="145" x2="145" y2="145" stroke="#FFD700" stroke-width="2.5" opacity="0.6"/>
</svg>
